{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>JakieMart</title>
    <link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
</head>
<body>

<!-- ================= TOP BAR ================= -->
<div class="topbar">

    <div class="logo">🟠 JakieMart</div>

    <!-- SEARCH -->
    <form class="search" action="{% url 'search' %}" method="GET">
        <input type="text" name="q" placeholder="Search products...">
        <button type="submit">Search</button>
    </form>

    <!-- NAV -->
    <div class="nav">
        <a href="{% url 'home' %}">Home</a>

        <a href="{% url 'cart' %}">
            Cart 🛒 <span class="badge">{{ cart_count }}</span>
        </a>

        <a href="{% url 'orders' %}">My Orders</a>
    </div>

</div>

<!-- ================= HERO ================= -->
<div class="hero">
    <h1>🔥 Welcome to JakieMart</h1>
    <p>Best Deals in Ghana & Worldwide</p>
</div>

<!-- ================= PRODUCTS ================= -->
<div class="products">

    {% for product in products %}
    <div class="product">

        <img src="{{ product.image.url }}" alt="{{ product.name }}">

        <h3>{{ product.name }}</h3>

        <p class="price">${{ product.price }}</p>

        <p>{{ product.description|default:"No description" }}</p>

        <a class="btn" href="{% url 'add_to_cart' product.id %}">
            Add to Cart
        </a>

    </div>
    {% endfor %}

</div>

</body>
</html>
