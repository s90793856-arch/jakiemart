{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
</head>
<body>

<!-- ================= TOPBAR ================= -->
<div class="topbar">
    <div class="logo">🛒 MyShop Cart</div>

    <div class="nav">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'checkout' %}">Checkout</a>
    </div>
</div>

<h2 class="title">Your Shopping Cart</h2>

<!-- ================= CART ITEMS ================= -->
<div id="cart-container">

    {% for item in items %}
    <div class="cart-item" id="item-{{ item.id }}">

        <!-- PRODUCT IMAGE -->
        <img src="{{ item.product.image.url }}" alt="">

        <!-- PRODUCT INFO -->
        <div class="info">
            <h3>{{ item.product.name }}</h3>
            <p class="price">${{ item.product.price }}</p>

            <!-- ================= QTY CONTROLS ================= -->
            <div class="qty">
                <button onclick="decreaseQty({{ item.id }})">−</button>

                <span id="qty-{{ item.id }}">{{ item.quantity }}</span>

                <button onclick="increaseQty({{ item.id }})">+</button>
            </div>

            <!-- REMOVE BUTTON -->
            <button class="remove" onclick="removeItem({{ item.id }})">
                Remove
            </button>
        </div>

    </div>
    {% empty %}
        <p style="padding:20px;">Your cart is empty 🛒</p>
    {% endfor %}

</div>

<!-- ================= TOTAL ================= -->
<h2 class="total">
    Total: $<span id="total">{{ total }}</span>
</h2>

<!-- ================= JAVASCRIPT (AJAX) ================= -->
<script>

// INCREASE QTY
function increaseQty(id){
    fetch(`/cart/increase/${id}/`)
    .then(res => res.json())
    .then(data => {
        location.reload(); // refresh for updated total
    });
}

// DECREASE QTY
function decreaseQty(id){
    fetch(`/cart/decrease/${id}/`)
    .then(res => res.json())
    .then(data => {
        location.reload();
    });
}

// REMOVE ITEM (NO REFRESH)
function removeItem(id){
    fetch(`/cart/remove/${id}/`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("item-" + id).remove();

        // optional refresh total
        location.reload();
    });
}

</script>

</body>
</html>
